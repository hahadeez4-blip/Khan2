<!DOCTYPE html>
<html>
<head>
  <title>KHAN HOMEWORK</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    /* ⭐ Stars background */
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      z-index: -1;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      animation: float 10s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); opacity: 1; }
      to { transform: translateY(-10vh); opacity: 0; }
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .hidden { display: none; }

    /* ⚡ Flash text */
    .flash {
      animation: flash 1s infinite alternate;
    }

    @keyframes flash {
      from { opacity: 0.5; }
      to { opacity: 1; }
    }

    /* 📊 Loading bar */
    .bar-container {
      width: 300px;
      height: 20px;
      background: white;
      margin-top: 20px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: black;
      transition: width 0.2s;
    }

    input {
      padding: 10px;
      margin-top: 15px;
      background: black;
      color: white;
      border: 1px solid white;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
    }

    .fake {
      margin-top: 15px;
      font-size: 14px;
      color: gray;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- 🔄 LOADING -->
<div id="loading" class="center">
  <h1 class="flash">KHAN HOMEWORK</h1>
  <div class="bar-container">
    <div id="bar" class="bar"></div>
  </div>
  <p id="percent">0%</p>
</div>

<!-- 🔑 KEY -->
<div id="key" class="center hidden">
  <h1 class="flash">Enter Key</h1>
  <input id="k" type="password" placeholder="••••••••">
  <br>
  <button onclick="checkKey()">Unlock</button>

  <!-- 🎭 Fake key -->
  <div class="fake" onclick="fakeKey()">FREE KEY</div>
</div>

<script>
/* ⭐ Generate stars */
for (let i = 0; i < 100; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.left = Math.random() * 100 + "vw";
  star.style.animationDuration = (5 + Math.random() * 10) + "s";
  star.style.opacity = Math.random();
  document.getElementById("stars").appendChild(star);
}

/* 📊 Loading bar */
let progress = 0;
const bar = document.getElementById("bar");
const percent = document.getElementById("percent");

const interval = setInterval(() => {
  progress += Math.random() * 8;

  if (progress >= 100) {
    progress = 100;
    clearInterval(interval);

    document.getElementById("loading").classList.add("hidden");
    document.getElementById("key").classList.remove("hidden");
  }

  bar.style.width = progress + "%";
  percent.innerText = Math.floor(progress) + "%";

}, 200);

/* 🔑 Real key */
function checkKey() {
  const input = k.value;

  if (input === "goodluck") {
    localStorage.setItem("access","granted");
    window.location.href = "/home";

  } else if (input === "dinoderek") {
    localStorage.setItem("access","granted");
    window.location.href = "/derek";

  } else if (input === "v3") {
    localStorage.setItem("access","granted");
    window.location.href = "/shadow";

  } else if (input === "XAxis") {
    localStorage.setItem("access","granted");
    window.location.href = "/axis";

  } else if (input === "truffled") { // 🍫 NEW KEY
    localStorage.setItem("access","granted");
    window.location.href = "/truffled";

  } else {
    window.location.href = "https://www.deltamath.com";
  }
}



// 🎭 Fake key button (troll)
function fakeKey() {
  if (Math.random() > 0.5) {
    window.location.href = "https://www.khanacademy.org";
  } else {
    window.location.href = "https://www.deltamath.com";
  }
}

</script>

</body>
</html>
