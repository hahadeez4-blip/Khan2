<!DOCTYPE html>
<html>
<head>
  <title>Loader + Key</title>
  <style>
    body { background: #0f0f0f; color: white; font-family: Arial; text-align:center; }
    .center { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); }
    .hidden { display:none; }
    .loader { border:6px solid #333; border-top:6px solid white; border-radius:50%; width:50px; height:50px; animation:spin 1s linear infinite; margin:auto; }
    @keyframes spin { 100% { transform:rotate(360deg); } }
    input, button { padding:10px; margin-top:10px; font-size:16px; }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading" class="center">
  <h1>Loading...</h1>
  <div class="loader"></div>
</div>

<!-- Key Screen -->
<div id="key" class="center hidden">
  <h1>Enter Key Bum</h1>
  <input id="k" placeholder="Enter key...">
  <br>
  <button onclick="checkKey()">Submit</button>
</div>

<script>
  // Show key screen after 3 seconds
  setTimeout(() => {
    loading.classList.add("hidden");
    key.classList.remove("hidden");
  }, 3000);

  function checkKey() {
    const correctKey = "k@ss";  // <-- Change to your desired key

    if (k.value === correctKey) {
      alert("Welcome in!");
      localStorage.setItem("access","granted");
      window.location.href = "/home";
    } else {
      // ❌ Wrong key → redirect to Delta Math
      window.location.href = "https://www.deltamath.com";
    }
  }
</script>

</body>
</html>
