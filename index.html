<!DOCTYPE html>
<html>
<head>
  <title>Khan Homework</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      overflow: hidden;
      background: linear-gradient(270deg, #0f0f0f, #1a1a1a, #000000);
      background-size: 600% 600%;
      animation: bgMove 10s ease infinite;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .hidden { display: none; }

    /* 🔥 Flashing title */
    .flash {
      animation: flash 1s infinite alternate;
    }

    @keyframes flash {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }

    /* 📊 Progress bar */
    .bar-container {
      width: 300px;
      height: 20px;
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 20px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, white, gray);
      transition: width 0.2s;
    }

    /* 🔑 Hidden key input */
    input {
      padding: 10px;
      margin-top: 15px;
      font-size: 16px;
      border: none;
      outline: none;
      background: #222;
      color: white;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
      background: white;
      border: none;
    }

  </style>
</head>
<body>

<!-- 🔄 LOADING SCREEN -->
<div id="loading" class="center">
  <h1 class="flash">Initializing...</h1>
  <div class="bar-container">
    <div id="bar" class="bar"></div>
  </div>
  <p id="percent">0%</p>
</div>

<!-- 🔑 KEY SCREEN -->
<div id="key" class="center hidden">
  <h1 class="flash">Enter Access Key</h1>
  <input id="k" type="password" placeholder="••••••••••">
  <br>
  <button onclick="checkKey()">Unlock</button>
</div>

<script>
let progress = 0;
const bar = document.getElementById("bar");
const percent = document.getElementById("percent");

// Fake loading progress
const interval = setInterval(() => {
  progress += Math.random() * 10;
  if (progress >= 100) {
    progress = 100;
    clearInterval(interval);

    // Switch to key screen
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("key").classList.remove("hidden");
  }

  bar.style.width = progress + "%";
  percent.innerText = Math.floor(progress) + "%";

}, 200);

// 🔑 Key check
function checkKey() {
  const correctKey = "JOB"; // change this

  if (k.value === correctKey) {
    localStorage.setItem("access","granted");
    window.location.href = "/home";
  } else {
    // ❌ Wrong key → redirect
    window.location.href = "https://www.deltamath.com";
  }
}
</script>

</body>
</html>
